services:
  - type: web
    name: wallace-observability-demo
    runtime: python
    repo: https://github.com/YOUR_USERNAME/demo-api
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
