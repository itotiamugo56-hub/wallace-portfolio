[build]
  command = "npm run build"
  publish = "dist"

[build.processing]
  skip_processing = false

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Explicitly include cv.html
[[headers]]
  for = "/cv.html"
  [headers.values]
    Cache-Control = "max-age=0, must-revalidate"
